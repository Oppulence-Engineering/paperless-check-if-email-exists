openapi: 3.0.0
info:
  contact:
    email: amaury@reacher.email
    name: Reacher
    url: https://reacher.email
  description: |-
    ### What is Reacher?

    Reacher is a robust, open-source email verification API service available as both a SaaS and self-hosted solution.
  license:
    name: AGPL-3.0 OR Commercial
    url: https://github.com/reacherhq/check-if-email-exists/blob/master/LICENSE.md
  termsOfService: https://github.com/reacherhq/policies/blob/master/terms/index.fr.md
  title: Reacher
  version: 0.11.0
servers:
- description: Reacher Production
  url: https://api.reacher.email
security:
- Authorization: []
paths:
  /healthz:
    get:
      description: Returns a lightweight readiness signal with no upstream dependency
        checks.
      operationId: healthz
      responses:
        "200":
          description: Service is alive
      summary: GET /healthz
      tags:
      - Health
  /openapi.json:
    get:
      operationId: openapi_spec
      responses:
        "200":
          description: Merged OpenAPI specification for all documented REST endpoints
      summary: Serve the merged OpenAPI document for all documented REST endpoints.
      tags:
      - System
  /readyz:
    get:
      description: Performs dependency checks for Postgres and RabbitMQ and returns
        readiness status.
      operationId: readyz
      responses:
        "200":
          description: Service readiness and dependency checks
      summary: GET /readyz
      tags:
      - Health
  /v0/bulk:
    post:
      description: Creates a legacy bulk verification job and queues tasks synchronously
        via sqlxmq.
      operationId: create_bulk_job
      responses:
        "200":
          description: Legacy bulk job created
      summary: POST /v0/bulk
      tags:
      - v0
  /v0/bulk/{job_id}:
    get:
      description: Returns current status and summary for a legacy bulk verification
        job.
      operationId: get_bulk_job_status
      parameters:
      - description: Legacy bulk job identifier
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      responses:
        "200":
          description: Bulk status response
      summary: "GET /v0/bulk/{job_id}"
      tags:
      - v0
  /v0/bulk/{job_id}/results:
    get:
      description: Returns terminal result rows for a legacy bulk job.
      operationId: get_bulk_job_result
      parameters:
      - description: Legacy bulk job identifier
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      responses:
        "200":
          description: Bulk job results
      summary: "GET /v0/bulk/{job_id}/results"
      tags:
      - v0
  /v0/check_email:
    post:
      description: "Legacy email verification endpoint (deprecated, retained for compatibility)."
      operationId: post_check_email
      parameters:
      - description: Optional idempotency key
        explode: false
        in: header
        name: Idempotency-Key
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckEmailRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckEmailOutput"
          description: Email verification result
      summary: POST /v0/check_email
      tags:
      - v0
  /v1/admin/api-keys:
    get:
      description: List all API keys across tenants with optional filtering.
      operationId: list_all_api_keys
      responses:
        "200":
          description: All API keys
      summary: GET /v1/admin/api-keys
      tags:
      - Admin
  /v1/admin/jobs:
    get:
      description: List jobs across all tenants with optional filters.
      operationId: list_jobs
      responses:
        "200":
          description: Admin job list
      summary: GET /v1/admin/jobs
      tags:
      - Admin Jobs
  /v1/admin/jobs/{job_id}:
    get:
      description: Fetch a single job.
      operationId: get_job
      parameters:
      - description: Job identifier
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      responses:
        "200":
          description: Admin job details
      summary: "GET /v1/admin/jobs/{job_id}"
      tags:
      - Admin Jobs
  /v1/admin/jobs/{job_id}/events:
    get:
      description: Fetch events for a job.
      operationId: get_job_events
      parameters:
      - description: Job identifier
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      responses:
        "200":
          description: Job event list
      summary: "GET /v1/admin/jobs/{job_id}/events"
      tags:
      - Admin Jobs
  /v1/admin/jobs/{job_id}/results:
    get:
      description: Fetch task results for a job.
      operationId: get_job_results
      parameters:
      - description: Job identifier
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      responses:
        "200":
          description: Job result list
      summary: "GET /v1/admin/jobs/{job_id}/results"
      tags:
      - Admin Jobs
  /v1/admin/tenants:
    get:
      description: List tenants with optional status and pagination filters.
      operationId: list_tenants
      responses:
        "200":
          description: Tenant list
      summary: GET /v1/admin/tenants
      tags:
      - Admin
    post:
      description: Create a new tenant.
      operationId: create_tenant
      responses:
        "201":
          description: Tenant created
      summary: POST /v1/admin/tenants
      tags:
      - Admin
  /v1/admin/tenants/{tenant_id}:
    delete:
      description: Delete a tenant.
      operationId: delete_tenant
      parameters:
      - description: Tenant identifier
        explode: false
        in: path
        name: tenant_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Tenant deleted
      summary: "DELETE /v1/admin/tenants/{tenant_id}"
      tags:
      - Admin
    get:
      description: Fetch tenant details by tenant ID.
      operationId: get_tenant
      parameters:
      - description: Tenant identifier
        explode: false
        in: path
        name: tenant_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Tenant details
      summary: "GET /v1/admin/tenants/{tenant_id}"
      tags:
      - Admin
    put:
      description: Update tenant fields.
      operationId: update_tenant
      parameters:
      - description: Tenant identifier
        explode: false
        in: path
        name: tenant_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Tenant updated
      summary: "PUT /v1/admin/tenants/{tenant_id}"
      tags:
      - Admin
  /v1/admin/tenants/{tenant_id}/api-keys:
    get:
      description: List API keys for a tenant.
      operationId: list_api_keys
      parameters:
      - description: Tenant identifier
        explode: false
        in: path
        name: tenant_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Tenant API keys
      summary: "GET /v1/admin/tenants/{tenant_id}/api-keys"
      tags:
      - Admin
    post:
      description: Create a new API key for a tenant.
      operationId: create_api_key
      parameters:
      - description: Tenant identifier
        explode: false
        in: path
        name: tenant_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "201":
          description: API key created
      summary: "POST /v1/admin/tenants/{tenant_id}/api-keys"
      tags:
      - Admin
  /v1/admin/tenants/{tenant_id}/api-keys/{key_id}:
    delete:
      description: Revoke an API key.
      operationId: revoke_api_key
      parameters:
      - description: Tenant identifier
        explode: false
        in: path
        name: tenant_id
        required: true
        schema:
          type: string
        style: simple
      - description: API key identifier
        explode: false
        in: path
        name: key_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          description: API key revoked
      summary: "DELETE /v1/admin/tenants/{tenant_id}/api-keys/{key_id}"
      tags:
      - Admin
    get:
      description: Fetch one API key by tenant and key ID.
      operationId: get_api_key
      parameters:
      - description: Tenant identifier
        explode: false
        in: path
        name: tenant_id
        required: true
        schema:
          type: string
        style: simple
      - description: API key identifier
        explode: false
        in: path
        name: key_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          description: API key details
      summary: "GET /v1/admin/tenants/{tenant_id}/api-keys/{key_id}"
      tags:
      - Admin
    patch:
      description: Update metadata for an API key.
      operationId: update_api_key
      parameters:
      - description: Tenant identifier
        explode: false
        in: path
        name: tenant_id
        required: true
        schema:
          type: string
        style: simple
      - description: API key identifier
        explode: false
        in: path
        name: key_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          description: API key updated
      summary: "PATCH /v1/admin/tenants/{tenant_id}/api-keys/{key_id}"
      tags:
      - Admin
  /v1/admin/tenants/{tenant_id}/api-keys/{key_id}/reactivate:
    post:
      description: Reactivate a previously revoked API key.
      operationId: reactivate_api_key
      parameters:
      - description: Tenant identifier
        explode: false
        in: path
        name: tenant_id
        required: true
        schema:
          type: string
        style: simple
      - description: API key identifier
        explode: false
        in: path
        name: key_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          description: API key reactivated
      summary: "POST /v1/admin/tenants/{tenant_id}/api-keys/{key_id}/reactivate"
      tags:
      - Admin
  /v1/admin/tenants/{tenant_id}/jobs:
    get:
      description: List jobs scoped to one tenant.
      operationId: list_tenant_jobs
      parameters:
      - description: Tenant identifier
        explode: false
        in: path
        name: tenant_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Tenant job list
      summary: "GET /v1/admin/tenants/{tenant_id}/jobs"
      tags:
      - Admin Jobs
  /v1/admin/tenants/{tenant_id}/quota:
    get:
      description: Fetch current tenant quota usage and remaining allowance.
      operationId: get_tenant_quota
      parameters:
      - description: Tenant identifier
        explode: false
        in: path
        name: tenant_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Tenant quota details
      summary: "GET /v1/admin/tenants/{tenant_id}/quota"
      tags:
      - Admin
    patch:
      description: Update tenant quota limit.
      operationId: update_tenant_quota
      parameters:
      - description: Tenant identifier
        explode: false
        in: path
        name: tenant_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Quota updated
      summary: "PATCH /v1/admin/tenants/{tenant_id}/quota"
      tags:
      - Admin
  /v1/admin/tenants/{tenant_id}/quota/reset:
    post:
      description: Reset tenant quota usage counters.
      operationId: reset_tenant_quota
      parameters:
      - description: Tenant identifier
        explode: false
        in: path
        name: tenant_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Quota reset
      summary: "POST /v1/admin/tenants/{tenant_id}/quota/reset"
      tags:
      - Admin
  /v1/bulk:
    post:
      description: Creates a tenant-scoped bulk job for async processing.
      operationId: v1_create_bulk_job
      parameters:
      - description: Optional idempotency key
        explode: false
        in: header
        name: Idempotency-Key
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      responses:
        "200":
          description: Bulk job created
      summary: Create the v1 bulk endpoint.
      tags:
      - v1
  /v1/bulk/{job_id}:
    get:
      description: Returns status and current progress for a tenant-scoped v1 bulk
        job.
      operationId: v1_get_bulk_job_progress
      parameters:
      - description: V1 bulk job identifier
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      responses:
        "200":
          description: Bulk job progress
      summary: "GET /v1/bulk/{job_id}"
      tags:
      - Jobs
  /v1/bulk/{job_id}/results:
    get:
      description: Returns terminal results for a tenant-scoped v1 bulk job.
      operationId: v1_get_bulk_job_results
      parameters:
      - description: V1 bulk job identifier
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      - description: "Supported values: `json`, `csv`"
        explode: true
        in: query
        name: format
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          format: int64
          minimum: 0
          type: integer
        style: form
      - explode: true
        in: query
        name: offset
        required: false
        schema:
          format: int64
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkJobResultsResponse"
            text/csv:
              schema:
                format: binary
                type: string
          description: Bulk job results
      summary: "GET /v1/bulk/{job_id}/results"
      tags:
      - Jobs
  /v1/check_email:
    post:
      description: Verifies an email address and returns a result.
      operationId: v1_check_email
      parameters:
      - description: Optional idempotency key
        explode: false
        in: header
        name: Idempotency-Key
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckEmailRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckEmailOutput"
          description: Email verification result
      summary: POST /v1/check_email
      tags:
      - v1
  /v1/find_email:
    post:
      operationId: v1_find_email
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FindEmailRequest"
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindEmailAcceptedResponse"
          description: Finder job accepted
      summary: POST /v1/find_email
      tags:
      - v1
  /v1/find_email/{job_id}:
    get:
      operationId: v1_get_find_email
      parameters:
      - description: Finder job identifier
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindEmailStatusResponse"
          description: Finder job result
      summary: "GET /v1/find_email/{job_id}"
      tags:
      - v1
  /v1/jobs/{job_id}:
    get:
      description: Returns progress summary and state for a tenant-scoped bulk job.
      operationId: v1_get_job_status
      parameters:
      - description: Bulk job identifier
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      responses:
        "200":
          description: Bulk job progress summary
      summary: "GET /v1/jobs/{job_id}"
      tags:
      - Jobs
  /v1/jobs/{job_id}/approval:
    get:
      description: Returns a pre-send approval checklist summarizing list quality.
      operationId: v1_job_approval_checklist
      parameters:
      - description: Bulk job identifier
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalChecklistResponse"
          description: Pre-send approval checklist
      summary: "GET /v1/jobs/{job_id}/approval"
      tags:
      - Jobs
  /v1/jobs/{job_id}/cancel:
    post:
      description: Requests cancellation for a tenant-scoped bulk job.
      operationId: v1_cancel_job
      parameters:
      - description: Bulk job identifier
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      responses:
        "200":
          description: Job cancellation accepted
      summary: "POST /v1/jobs/{job_id}/cancel"
      tags:
      - Jobs
  /v1/jobs/{job_id}/download:
    get:
      description: Streams all terminal task results for a tenant-scoped bulk job.
      operationId: v1_download_job_results
      parameters:
      - description: Bulk job identifier
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      - description: "Supported values: `csv`, `json`"
        explode: true
        in: query
        name: format
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/x-ndjson:
              schema:
                format: binary
                type: string
            text/csv:
              schema:
                format: binary
                type: string
          description: Job result download stream
      summary: "GET /v1/jobs/{job_id}/download"
      tags:
      - Jobs
  /v1/jobs/{job_id}/events:
    get:
      description: Returns paginated event history for a tenant-scoped bulk job.
      operationId: v1_get_job_events
      parameters:
      - description: Bulk job identifier
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          format: int64
          type: integer
        style: form
      - explode: true
        in: query
        name: offset
        required: false
        schema:
          format: int64
          type: integer
        style: form
      responses:
        "200":
          description: Job events
      summary: "GET /v1/jobs/{job_id}/events"
      tags:
      - Jobs
  /v1/jobs/{job_id}/results:
    get:
      description: Returns paginated completed task results for a tenant-scoped bulk
        job.
      operationId: v1_get_job_results
      parameters:
      - description: Bulk job identifier
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      - explode: true
        in: query
        name: cursor
        required: false
        schema:
          format: int64
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          format: int64
          type: integer
        style: form
      - explode: true
        in: query
        name: state
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResultPageResponse"
          description: Job result page
      summary: "GET /v1/jobs/{job_id}/results"
      tags:
      - Jobs
  /v1/jobs/{job_id}/retry:
    post:
      description: Retries all failed or dead-lettered tasks in a tenant-scoped bulk
        job.
      operationId: v1_retry_job
      parameters:
      - description: Bulk job identifier
        explode: false
        in: path
        name: job_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryJobResponse"
          description: Retry initiated
      summary: "POST /v1/jobs/{job_id}/retry"
      tags:
      - Jobs
  /v1/lists:
    get:
      operationId: v1_list_lists
      parameters:
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          format: int64
          type: integer
        style: form
      - explode: true
        in: query
        name: offset
        required: false
        schema:
          format: int64
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListListResponse"
          description: List resources
      summary: GET /v1/lists
      tags:
      - v1
    post:
      operationId: v1_create_list
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ListUploadRequest"
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUploadResponse"
          description: List upload accepted
      summary: POST /v1/lists
      tags:
      - v1
  /v1/lists/{list_id}:
    delete:
      operationId: v1_delete_list
      parameters:
      - description: List identifier
        explode: false
        in: path
        name: list_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDeleteResponse"
          description: List deleted
      summary: "DELETE /v1/lists/{list_id}"
      tags:
      - v1
    get:
      operationId: v1_get_list
      parameters:
      - description: List identifier
        explode: false
        in: path
        name: list_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDetailResponse"
          description: List detail
      summary: "GET /v1/lists/{list_id}"
      tags:
      - v1
  /v1/lists/{list_id}/download:
    get:
      operationId: v1_download_list
      parameters:
      - description: List identifier
        explode: false
        in: path
        name: list_id
        required: true
        schema:
          format: int32
          type: integer
        style: simple
      - explode: true
        in: query
        name: filter
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: format
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            text/csv:
              schema:
                format: binary
                type: string
          description: Cleaned list CSV download
      summary: "GET /v1/lists/{list_id}/download"
      tags:
      - v1
  /v1/me:
    get:
      description: Returns the authenticated tenant context and quota metadata.
      operationId: v1_me
      responses:
        "200":
          description: Current tenant profile
      summary: GET /v1/me
      tags:
      - Account
