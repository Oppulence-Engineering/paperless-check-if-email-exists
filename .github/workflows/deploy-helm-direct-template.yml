name: Deploy Helm Chart Directly

on:
  workflow_call:
    inputs:
      cluster:
        description: 'Target cluster (us-east, eu-central, us-west)'
        required: true
        type: string
      service_name:
        description: 'Name of the service to deploy (e.g., oppulence-unified-api)'
        required: true
        type: string
      service_path:
        description: 'Path to the service directory'
        required: true
        type: string
      chart_repository:
        description: 'Helm chart OCI repository URL (e.g., oci://ghcr.io/oppulence-engineering/oppulence-charts/charts/oppulence-production) or local path (e.g., ./charts/canvas)'
        required: true
        type: string
      namespace:
        description: 'Kubernetes namespace to deploy to'
        required: true
        type: string
        default: 'oppulence'
      create_namespace:
        description: 'Whether to create the namespace if it does not exist'
        required: false
        type: boolean
        default: true
      version:
        description: 'Version of the service to deploy'
        required: false
        type: string
      values_file:
        description: 'Path to values file overlay (e.g., charts/canvas/values-api.yaml)'
        required: false
        type: string
      image_repository:
        description: 'Override image repository (e.g., ghcr.io/oppulence-engineering/oppulence-canvas-api)'
        required: false
        type: string
      image_tag:
        description: 'Override image tag (e.g., sha-abc123)'
        required: false
        type: string
      secret_env_overrides:
        description: 'Optional newline-delimited KEY=VALUE pairs for config.secretEnv overrides'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      cluster:
        description: 'Target cluster (us-east, eu-central, us-west)'
        required: true
        type: choice
        options:
          - us-east
          - eu-central
          - us-west
      service_name:
        description: 'Name of the service to deploy (e.g., oppulence-unified-api)'
        required: true
        type: string
      service_path:
        description: 'Path to the service directory'
        required: true
        type: string
      chart_repository:
        description: 'Helm chart OCI repository URL (e.g., oci://ghcr.io/oppulence-engineering/oppulence-charts/charts/oppulence-production) or local path (e.g., ./charts/canvas)'
        required: true
        type: string
      namespace:
        description: 'Kubernetes namespace to deploy to'
        required: true
        type: string
        default: 'oppulence'
      create_namespace:
        description: 'Whether to create the namespace if it does not exist'
        required: false
        type: boolean
        default: true
      version:
        description: 'Version of the service to deploy'
        required: false
        type: string
      values_file:
        description: 'Path to values file overlay (e.g., charts/canvas/values-api.yaml)'
        required: false
        type: string
      image_repository:
        description: 'Override image repository (e.g., ghcr.io/oppulence-engineering/oppulence-canvas-api)'
        required: false
        type: string
      image_tag:
        description: 'Override image tag (e.g., sha-abc123)'
        required: false
        type: string
      secret_env_overrides:
        description: 'Optional newline-delimited KEY=VALUE pairs for config.secretEnv overrides'
        required: false
        type: string
        default: ''

permissions:
  contents: write # needed to write releases
  id-token: write # needed for keyless signing
  packages: write # needed for ghcr access

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load kubeconfig
        env:
          KC_US_EAST: ${{ secrets.KUBE_CONFIG_US_EAST }}
          KC_EU_CENTRAL: ${{ secrets.KUBE_CONFIG_EU_CENTRAL }}
          KC_US_WEST: ${{ secrets.KUBE_CONFIG_US_WEST }}
        run: |
          mkdir -p "$HOME/.kube"
          case "${{ inputs.cluster }}" in
            us-east)     printf '%s' "$KC_US_EAST" ;;
            eu-central)  printf '%s' "$KC_EU_CENTRAL" ;;
            us-west)     printf '%s' "$KC_US_WEST" ;;
            *) echo "Unknown cluster: ${{ inputs.cluster }}"; exit 1 ;;
          esac > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Verify cluster connectivity
        run: |
          echo "Targeting cluster: ${{ inputs.cluster }}"
          kubectl get nodes

      - name: Select per-cluster read replica
        id: replica
        run: |
          NS="${{ inputs.namespace }}"
          CLUSTER="${{ inputs.cluster }}"
          if [[ "$NS" == *staging* ]]; then
            case "$CLUSTER" in
              us-east)     echo "url=" >> "$GITHUB_OUTPUT" ;;
              eu-central)  echo "url=${{ secrets.HELM_READ_REPLICA_URL_STAGING_EU_CENTRAL }}" >> "$GITHUB_OUTPUT" ;;
              us-west)     echo "url=${{ secrets.HELM_READ_REPLICA_URL_STAGING_US_WEST }}" >> "$GITHUB_OUTPUT" ;;
            esac
          else
            case "$CLUSTER" in
              us-east)     echo "url=" >> "$GITHUB_OUTPUT" ;;
              eu-central)  echo "url=${{ secrets.HELM_READ_REPLICA_URL_EU_CENTRAL }}" >> "$GITHUB_OUTPUT" ;;
              us-west)     echo "url=${{ secrets.HELM_READ_REPLICA_URL_US_WEST }}" >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Deploy Helm Chart
        env:
          HELM_POSTGRES_URL: ${{ secrets.HELM_POSTGRES_URL }}
          HELM_READ_REPLICA_URL: ${{ steps.replica.outputs.url }}
          HELM_RABBIT_URL: ${{ secrets.HELM_RABBIT_URL }}
          RCH__PROXY__HOST: ${{ secrets.RCH__PROXY__HOST }}
          RCH__PROXY__PORT: ${{ secrets.RCH__PROXY__PORT }}
          RCH__PROXY__USERNAME: ${{ secrets.RCH__PROXY__USERNAME }}
          RCH__PROXY__PASSWORD: ${{ secrets.RCH__PROXY__PASSWORD }}
          RCH__HEADER_SECRET: ${{ secrets.RCH__HEADER_SECRET }}
          HELM_SENTRY_DSN: ${{ secrets.HELM_SENTRY_DSN }}
        run: |
          NAMESPACE_FLAG="-n ${{ inputs.namespace }}"
          CREATE_NAMESPACE_FLAG=""
          VERSION_FLAG=""
          VALUES_FLAG=""
          IMAGE_REPO_FLAG=""
          IMAGE_TAG_FLAG=""

          if [ "${{ inputs.create_namespace }}" = "true" ]; then
            CREATE_NAMESPACE_FLAG="--create-namespace"
          fi

          if [ -n "${{ inputs.version }}" ] && [ "${{ inputs.version }}" != "latest" ]; then
            VERSION_FLAG="--version ${{ inputs.version }}"
          fi

          if [ -n "${{ inputs.values_file }}" ]; then
            VALUES_FLAG="-f ${{ inputs.values_file }}"
          fi

          if [ -n "${{ inputs.image_repository }}" ]; then
            IMAGE_REPO_FLAG="--set image.repository=${{ inputs.image_repository }}"
          fi

          if [ -n "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG_FLAG="--set image.tag=${{ inputs.image_tag }}"
          fi

          SECRET_ENV_OVERRIDES="${{ inputs.secret_env_overrides }}"
          SECRET_ENV_FLAGS=()
          if [ -n "$SECRET_ENV_OVERRIDES" ]; then
            while IFS= read -r line; do
              # Trim whitespace
              trimmed="$(echo "$line" | xargs)"
              [ -z "$trimmed" ] && continue
              case "$trimmed" in
                \#*) continue ;;
              esac
              key="${trimmed%%=*}"
              value="${trimmed#*=}"
              if [ -z "$key" ] || [ "$key" = "$trimmed" ]; then
                echo "Invalid secret override line (expected KEY=VALUE): $line"
                exit 1
              fi
              if [ "${value:0:1}" = "$" ]; then
                env_name="${value:1}"
                value="${!env_name:-}"
              fi
              if [ -z "$value" ]; then
                echo "Skipping secret override '$key' (empty value)."
                continue
              fi
              SECRET_ENV_FLAGS+=(--set-string "config.secretEnv.${key}=${value}")
            done <<<"$SECRET_ENV_OVERRIDES"
          fi

          echo "Deploying ${{ inputs.service_name }} from: ${{ inputs.chart_repository }}"

          helm upgrade --install ${{ inputs.service_name }} \
            ${VERSION_FLAG} \
            ${{ inputs.chart_repository }} \
            ${VALUES_FLAG} \
            ${IMAGE_REPO_FLAG} \
            ${IMAGE_TAG_FLAG} \
            "${SECRET_ENV_FLAGS[@]}" \
            ${NAMESPACE_FLAG} ${CREATE_NAMESPACE_FLAG} \
            --wait
