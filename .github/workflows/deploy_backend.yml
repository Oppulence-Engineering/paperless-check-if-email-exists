name: deploy_backend

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Publish backend image to GHCR so releases share a single source of truth.
permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image_tag.outputs.value }}
    env:
      IMAGE_NAME: ghcr.io/oppulence-engineering/check-if-email-exists-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          load: true
          tags: reacher-backend-smoke:${{ github.sha }}
          cache-from: type=gha

      - name: Smoke backend image
        run: ./ci/smoke_backend_image.bash reacher-backend-smoke:${{ github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Capture image tag
        id: image_tag
        run: echo "value=${{ steps.meta.outputs.version }}" >> "$GITHUB_OUTPUT"

  deploy-production:
    name: "Production – ${{ matrix.cluster }}"
    needs: docker
    strategy:
      fail-fast: false
      matrix:
        cluster: [us-east, eu-central, us-west]
    uses: ./.github/workflows/deploy-helm-direct-template.yml
    permissions:
      contents: write
      packages: write
      id-token: write
    with:
      cluster: ${{ matrix.cluster }}
      service_name: check-if-email-exists
      service_path: backend
      chart_repository: ./helm/check-if-email-exists
      namespace: paperless
      create_namespace: true
      image_repository: ghcr.io/oppulence-engineering/check-if-email-exists-backend
      image_tag: ${{ needs.docker.outputs.image_tag }}
      secret_env_overrides: |
        RCH__STORAGE__POSTGRES__DB_URL=$HELM_POSTGRES_URL
        RCH__STORAGE__POSTGRES__READ_REPLICA_URL=$HELM_READ_REPLICA_URL
        RCH__WORKER__RABBITMQ__URL=$HELM_RABBIT_URL
        RCH__PROXY__HOST=$RCH__PROXY__HOST
        RCH__PROXY__PORT=$RCH__PROXY__PORT
        RCH__PROXY__USERNAME=$RCH__PROXY__USERNAME
        RCH__PROXY__PASSWORD=$RCH__PROXY__PASSWORD
        RCH__HEADER_SECRET=$RCH__HEADER_SECRET
        RCH__SENTRY_DSN=$HELM_SENTRY_DSN
    secrets: inherit

  deploy-staging:
    name: "Staging – ${{ matrix.cluster }}"
    needs: docker
    strategy:
      fail-fast: false
      matrix:
        cluster: [us-east, eu-central, us-west]
    uses: ./.github/workflows/deploy-helm-direct-template.yml
    permissions:
      contents: write
      packages: write
      id-token: write
    with:
      cluster: ${{ matrix.cluster }}
      service_name: check-if-email-exists-staging
      service_path: backend
      chart_repository: ./helm/check-if-email-exists
      values_file: ./helm/check-if-email-exists/values.staging.yaml
      namespace: paperless-staging
      create_namespace: true
      image_repository: ghcr.io/oppulence-engineering/check-if-email-exists-backend
      image_tag: ${{ needs.docker.outputs.image_tag }}
      secret_env_overrides: |
        RCH__STORAGE__POSTGRES__DB_URL=$HELM_POSTGRES_URL_STAGING
        RCH__STORAGE__POSTGRES__READ_REPLICA_URL=$HELM_READ_REPLICA_URL
        RCH__WORKER__RABBITMQ__URL=$HELM_RABBIT_URL
        RCH__PROXY__HOST=$RCH__PROXY__HOST
        RCH__PROXY__PORT=$RCH__PROXY__PORT
        RCH__PROXY__USERNAME=$RCH__PROXY__USERNAME
        RCH__PROXY__PASSWORD=$RCH__PROXY__PASSWORD
        RCH__HEADER_SECRET=$RCH__HEADER_SECRET
        RCH__SENTRY_DSN=$HELM_SENTRY_DSN
    secrets: inherit
