# CI actions for the CLI only. We test that the CLI works on various platforms.
name: cli

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  # This job downloads and stores `cross` as an artifact, so that it can be
  # redownloaded across all of the jobs. Currently this copied pasted between
  # `ci.yml` and `deploy.yml`. Make sure to update both places when making
  # changes.
  install-cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: XAMPPRocky/get-github-release@v1
        id: cross
        with:
          owner: rust-embedded
          repo: cross
          matches: ${{ matrix.platform }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: cross-${{ matrix.platform }}
          path: ${{ steps.cross.outputs.install_path }}
    strategy:
      matrix:
        platform: [linux-musl, apple-darwin]

  macos:
    runs-on: macos-latest
    needs: install-cross
    steps:
      - uses: actions/checkout@v2
      - uses: actions/download-artifact@v4
        with:
          name: cross-apple-darwin
          path: /usr/local/bin/

      - run: chmod +x /usr/local/bin/cross

      - run: ci/set_rust_version.bash ${{ matrix.channel }} ${{ matrix.target }}
      - run: ci/build.bash cross ${{ matrix.target }}
        # Only test on macOS platforms since we can't simulate the others.
      - run: ci/test.bash cross ${{ matrix.target }}
        if: matrix.target == 'x86_64-apple-darwin'

    strategy:
      fail-fast: true
      matrix:
        channel: [stable]
        target:
          - x86_64-apple-darwin

  windows:
    if: false # Disable Windows tests for now, because Reacher Worker is not supported on Windows
    runs-on: windows-latest
    needs: install-cross
    steps:
      - uses: actions/checkout@v2
      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: "5.32"
          distribution: strawberry

      - run: ci/set_rust_version.bash ${{ matrix.channel }} ${{ matrix.target }}
        shell: bash
      - run: ci/build.ps1 cargo ${{ matrix.target }}
      - run: ci/test.bash cargo ${{ matrix.target }}
        shell: bash
    strategy:
      fail-fast: true
      matrix:
        channel: [stable]
        target:
          - x86_64-pc-windows-msvc
          - i686-pc-windows-msvc

  # x86_64 Linux targets — run on every PR and push
  linux:
    runs-on: ubuntu-latest
    needs: install-cross
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reacher_test
        ports:
          - 25432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.8.22-management
        ports:
          - 35672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics check_running"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:25432/reacher_test
      TEST_AMQP_URL: amqp://guest:guest@127.0.0.1:35672
      CROSS_CONTAINER_OPTS: "--network host"
    steps:
      - uses: actions/checkout@v2

      - name: Download Cross
        uses: actions/download-artifact@v4
        with:
          name: cross-linux-musl
          path: /tmp/
      - run: chmod +x /tmp/cross
      - run: ci/set_rust_version.bash ${{ matrix.channel }} ${{ matrix.target }}
      - run: ci/build.bash /tmp/cross ${{ matrix.target }}
      - run: ci/test.bash /tmp/cross ${{ matrix.target }}

    strategy:
      fail-fast: true
      matrix:
        channel: [stable]
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl

  # ARM Linux targets — only on push to master (slow due to QEMU emulation)
  linux-arm:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: install-cross
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reacher_test
        ports:
          - 25432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3.8.22-management
        ports:
          - 35672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics check_running"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:25432/reacher_test
      TEST_AMQP_URL: amqp://guest:guest@127.0.0.1:35672
      CROSS_CONTAINER_OPTS: "--network host"
    steps:
      - uses: actions/checkout@v2

      - name: Download Cross
        uses: actions/download-artifact@v4
        with:
          name: cross-linux-musl
          path: /tmp/
      - run: chmod +x /tmp/cross
      - run: ci/set_rust_version.bash ${{ matrix.channel }} ${{ matrix.target }}
      - run: ci/build.bash /tmp/cross ${{ matrix.target }}
      - run: ci/test.bash /tmp/cross ${{ matrix.target }}

    strategy:
      fail-fast: true
      matrix:
        channel: [stable]
        target:
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
