services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reacher
    ports:
      - "25432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.8.22-management
    ports:
      - "35672:5672"
      - "45672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      RCH__BACKEND_NAME: reacher-backend
      RCH__FROM_EMAIL: reacher@example.com
      RCH__HELLO_NAME: example.com
      RCH__HTTP_HOST: "0.0.0.0"
      RCH__HTTP_PORT: "8080"
      RCH__STORAGE__POSTGRES__DB_URL: postgres://postgres:postgres@postgres:5432/reacher
      RCH__WORKER__ENABLE: "true"
      RCH__WORKER__RABBITMQ__URL: amqp://guest:guest@rabbitmq:5672
      RCH__WORKER__RABBITMQ__CONCURRENCY: "10"
      SQLX_OFFLINE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
